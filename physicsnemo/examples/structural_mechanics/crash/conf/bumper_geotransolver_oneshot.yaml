# Bumper beam crash experiment using GeoTransolver (one-shot).
# Usage: python train.py --config-name=bumper_geotransolver

hydra:
  job:
    chdir: True
  run:
    dir: ./outputs/

experiment_name: "Bumper-GeoTransolver"

defaults:
  - reader: vtp
  - datapipe: point_cloud
  - model: geotransolver_one_shot
  - training: default
  - inference: default
  - _self_

# ┌───────────────────────────────────────────┐
# │                   Data                    │
# └───────────────────────────────────────────┘

training:
  raw_data_dir: ???        # set in config or via CLI: training.raw_data_dir=/path/to/train
  raw_data_dir_validation: ???   # set in config or via CLI: training.raw_data_dir_validation=/path/to/validation
  global_features_filepath: ???  # set in config or via CLI: training.global_features_filepath=/path/to/global_features.json
  optimizer: muon

  # ┌───────────────────────────────────────────┐
  # │                 Dataset                   │
  # └───────────────────────────────────────────┘

  num_time_steps: 51
  num_training_samples: 121
  num_validation_samples: 5

inference:
  raw_data_dir_test: ???         # set in config or via CLI: inference.raw_data_dir_test=/path/to/test

# ┌───────────────────────────────────────────┐
# │            Datapipe features              │
# └───────────────────────────────────────────┘

datapipe:
  static_features: []  # no per-node static features for this dataset
  dynamic_targets:
    - effective_plastic_strain
    - stress_vm
  global_features:
    - velocity_x
    - thickness_scale
    - rwall_origin_y
  sample_type: all_time_steps
# ┌───────────────────────────────────────────┐
# │            Model overrides                │
# └───────────────────────────────────────────┘

model:
  functional_dim: 3   # coords (3)
  out_dim: 250        # (num_time_steps - 1) * 5 = 50 * 5
  global_dim: 3       # must match len(datapipe.global_features)
  # OOD guard (disabled by default — set `guard_config` to a mapping to enable)
  guard_config: null
  # Example enabled config:
  # guard_config:
  #   buffer_size: 121       # FIFO buffer size (= num_training_samples)
  #   knn_k: 10              # k for geometry kNN distance (recommended 5–15)
  #   sensitivity: 1.5       # threshold = sensitivity * 99th-percentile in-dist
  #                          # kNN distance; >1 is less sensitive, <1 more.
