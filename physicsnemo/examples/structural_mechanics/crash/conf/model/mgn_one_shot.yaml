_target_: rollout.MeshGraphNetOneShot
_convert_: all

input_dim_nodes: 4   # coords (3) + features; override in experiment if using global_features
input_dim_edges: 4   # dx, dy, dz, distance (from graph datapipe)
output_dim: 75       # (num_time_steps - 1) * 3; override in experiment
do_concat_trick: true
num_processor_checkpoint_segments: 3

### Rollout parameters ###
num_time_steps: ${training.num_time_steps}
