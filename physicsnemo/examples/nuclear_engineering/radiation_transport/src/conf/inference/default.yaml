# Inference / evaluation knobs. All fields are required to be set
# explicitly (no fallbacks from the training-time config); the user
# supplies them via Hydra overrides on the CLI.

checkpoint_path: ???       # path to the best_model directory (contains checkpoint.0.*.pt + Transolver.0.*.mdlus)
output_dir: ???            # where to write metrics.yaml, qoi_metrics.yaml, and figures/
num_samples: null          # cap on number of test samples; null = all
num_plot_samples: 3        # number of per-sample flux-panel figures (evenly sampled across the test set)
device: null               # torch device override; null = cuda if available else cpu
use_amp: true              # autocast in eval; bf16 on CUDA, off on CPU
