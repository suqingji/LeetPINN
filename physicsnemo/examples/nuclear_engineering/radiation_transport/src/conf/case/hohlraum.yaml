# Hohlraum benchmark: axisymmetric cylindrical geometry with optional
# interior void regions. No interior heat source (Q is omitted from the
# embedding). Material properties are mapped via HohlraumMaterialMapper.

type: hohlraum
data_root: ???                                      # set by user (HF download root)
data_path: ${case.data_root}/hohlraum
split_file: ${case.data_root}/splits/hohlraum_splits.json

# Physics-loss configuration (hohlraum-specific override).
physics_loss_weight: 0.01

# Embedding/material configuration: hohlraum has no Q field.
include_q_in_embedding: false
embedding_dim_override: 3                           # sigma_a, sigma_s, sigma_t
