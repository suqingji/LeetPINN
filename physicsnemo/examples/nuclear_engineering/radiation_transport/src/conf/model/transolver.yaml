# Transolver hyperparameters. The `_target_` is consumed by hydra.utils.instantiate
# inside train.py::build_model. The two RTE-specific keys at the bottom
# (num_spatial_points, include_q_in_embedding) are stripped before instantiation
# — they configure the data adapter, not the model.

_target_: physicsnemo.models.transolver.Transolver
functional_dim: 14                                  # 2 coords + 12 Fourier features (2-D simulations)
embedding_dim: ${case.embedding_dim_override}
out_dim: 1                                          # predicted flux
n_layers: 8
n_hidden: 256
n_head: 16
slice_num: 128
mlp_ratio: 4
dropout: 0.0
use_te: false                                       # default false for portability; flip to true if Transformer Engine is installed.
structured_shape: null

# RTE-specific (stripped before instantiation in train.py::build_model)
num_spatial_points: -1
include_q_in_embedding: ${case.include_q_in_embedding}
