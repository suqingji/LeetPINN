input_dir: ${case.data_path}
flux_normalization_stats_file: ${case.data_root}/stats/lattice_flux_stats.yaml
flux_clip_threshold: 1.0e-8
normalize_coordinates: true
cache_static_arrays: true

# Fourier features for coordinates (adds 2 * coord_dims * num_frequencies features).
# Default: 3 freq * 2 coords * 2 (sin/cos) = 12 extra features, on top of 2 raw coords (x, y).
use_fourier_features: true
fourier_features:
  num_frequencies: 3
  coord_dims: 2
  base_frequency: 2.0
