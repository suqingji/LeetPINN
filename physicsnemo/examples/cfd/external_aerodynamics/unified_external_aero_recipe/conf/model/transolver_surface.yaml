# ---------------------------------------------------------------------------
# Transolver template -- SURFACE recipes.
# ---------------------------------------------------------------------------
# Transolver concats `[embedding, fx]` along the last dim, so `fx` must
# match `embedding`'s spatial dim.  The `expand_like` modifier
# broadcasts the freestream `U_inf` (a per-sample vector) across the
# per-cell axis of `embedding`, so `fx` ends up shaped to align with
# the per-cell features in `embedding`.
input_type: tensors
output_type: tensors

forward_kwargs:
  embedding:
    - interior.points
    - boundaries.vehicle.cell_data.normals
  fx:
    source: global_data.U_inf
    expand_like: embedding

model:
  _target_: physicsnemo.models.transolver.Transolver
  out_dim: ${out_dim}     # auto-set from the chosen dataset's `targets:` block
  functional_dim: 3       # fx = freestream velocity U_inf (3)
  embedding_dim: 6        # embedding = points (3) + normals (3)
  n_layers: 8
  n_hidden: 256
  dropout: 0.0
  n_head: 8
  act: "gelu"
  mlp_ratio: 4
  slice_num: 256
  unified_pos: false
  structured_shape: null  # unstructured mesh
  use_te: false
  plus: false
