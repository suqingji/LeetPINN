# ---------------------------------------------------------------------------
# GLOBE template -- SURFACE recipes.
# ---------------------------------------------------------------------------
# GLOBE is mesh-native: forward() takes Mesh objects (boundary meshes)
# and a 2-D point tensor (prediction points) directly.  The recipe
# preserves the DomainMesh end-to-end for `input_type: mesh`, so no
# adapter / wrapper is needed.
#
# Reference lengths are NONDIM in this config: positions are scaled by
# `metadata.L_ref=5.0` via the dataset's `NonDimensionalizeByMetadata`
# transform, so kernel lengths must be in nondim space too.  The values
# below are constants for now; per-sample reference lengths are a
# planned follow-up.
#
# `output_field_ranks` keys must match the dataset YAML's `targets:`
# block so the loss can find each predicted field in the output Mesh's
# point_data.  `boundary_source_data_ranks` keys must match the
# dataset's boundary_name (set to `vehicle` by MeshToDomainMesh in
# drivaer_ml_surface.yaml).  GLOBE auto-injects cell_normals from the
# boundary mesh's geometry and only pulls leaves it declared here from
# cell_data; anything else the dataset puts on the boundary (e.g. the
# `normals` field that `ComputeSurfaceNormals` writes for other recipe
# models) is silently ignored.  Empty here means "geometry-only
# boundary input".
input_type: mesh
output_type: mesh

forward_kwargs:
  prediction_points: interior.points          # (K_cells, 3) point cloud
  boundary_meshes:
    vehicle: boundaries.vehicle               # Mesh[2, 3] with K_cells cells
  reference_lengths:
    L_ref: 1.0                                # nondim (positions scaled by L_ref=5)
    delta_turb: 0.015                         # nondim (= 0.075 m / 5 m)

model:
  _target_: physicsnemo.experimental.models.globe.GLOBE
  n_spatial_dims: 3
  output_field_ranks:
    pressure: 0                # scalar
    wss: 1                     # vector
  boundary_source_data_ranks:
    vehicle: {}
  reference_length_names: [L_ref, delta_turb]
  reference_area: 0.0868       # 2.170 / 5.0^2 (nondim, since positions / L_ref)
  n_communication_hyperlayers: 2
  hidden_layer_sizes: [256, 256, 256]
  n_latent_scalars: 8
  n_latent_vectors: 4
  n_spherical_harmonics: 1
  theta: 10.0
  leaf_size: 1
  network_type: "pade"
  self_regularization_beta: 0.01
  latent_compression_scale: 100.0
  expand_far_targets: true
