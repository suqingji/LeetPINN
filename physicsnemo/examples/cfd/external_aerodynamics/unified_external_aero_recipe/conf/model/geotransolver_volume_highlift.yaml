# ---------------------------------------------------------------------------
# GeoTransolver template -- VOLUME recipes for HiLiftAeroML.
# ---------------------------------------------------------------------------
# HiLift volume data is a point cloud (no surface normals available) at
# a different physical scale than the DrivAerML volume meshes; the
# radii / neighbor counts therefore match the surface-style scale and
# the local-feature path is disabled.  Same volume forward_kwargs as
# the DrivAerML volume template.
input_type: tensors
output_type: tensors

forward_kwargs:
  geometry: interior.points
  local_embedding:
    - interior.points
    - interior.point_data.sdf
    - interior.point_data.sdf_normals
  local_positions: interior.points
  global_embedding: global_data.U_inf

model:
  _target_: physicsnemo.experimental.models.geotransolver.GeoTransolver
  out_dim: ${out_dim}     # auto-set from the chosen dataset's `targets:` block
  functional_dim: 7       # local_embedding = coords (3) + SDF (1) + SDF normals (3)
  geometry_dim: 3         # point coordinates
  global_dim: 3           # freestream velocity U_inf (3)
  n_layers: 12
  n_hidden: 256
  dropout: 0.0
  n_head: 8
  act: "gelu"
  mlp_ratio: 4
  slice_num: 256
  use_te: false
  plus: false
  include_local_features: false
  radii: [0.1, 0.5, 2.0]
  neighbors_in_radius: [16, 32, 64]
  n_hidden_local: 32
