# ---------------------------------------------------------------------------
# Universal cross-cutting defaults shared by train.yaml and infer.yaml.
# Anything truly training-only (num_epochs, optimizer.lr, scheduler)
# lives in train.yaml so the inference companion can stay clean of it;
# knobs both entry points need but with different values (output_dir,
# compile, sampling_resolution) are declared per entry point instead.
# ---------------------------------------------------------------------------

# -- Runtime knobs -----------------------------------------------------------
precision: "bfloat16"
profile: false
augment: false
benchmark_io: false

# -- Training fundamentals (the constants every loop needs, regardless
#     of schedule) -----------------------------------------------------------
training:
  seed: 42
  save_interval: 25
  loss_type: "huber"
  batch_size: 1
  scheduler_update_mode: "epoch"
  optimizer:
    weight_decay: 1.0e-4
    betas: [0.9, 0.999]
    eps: 1.0e-8

# -- DataLoader / Dataset Performance Tuning --------------------------------
dataloader:
  prefetch_factor: 1
  num_streams: 1
  use_streams: false
  num_workers: 1
  pin_memory: true

# -- Logging -----------------------------------------------------------------
logging:
  log_every_n_steps: 10
