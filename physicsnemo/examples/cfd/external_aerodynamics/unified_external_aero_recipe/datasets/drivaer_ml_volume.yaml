# DrivaerML volume dataset (DomainMesh)
# Loads domain_*.pmsh files containing interior volume mesh + vehicle boundary + global_data.
# Interior: tetrahedral volume mesh with fields in point_data.
# Boundary: triangulated car-body surface mesh keyed `vehicle` (curated layout).
# global_data: freestream conditions (U_inf, rho_inf, p_inf, nu, L_ref) are
# embedded directly in the .pmsh files and read straight out of each sample's
# global_data by NonDimensionalizeByMetadata.
# Splits are controlled by manifest.json + train_split/val_split in the training config.

train_datadir: ${dataset_paths.drivaer_ml}

pipeline:
  reader:
    _target_: ${dp:DomainMeshReader}
    path: ${train_datadir}
    pattern: "run_*/domain_*.pdmsh"
    subsample_n_points: ${sampling_resolution}
    subsample_n_cells: ${sampling_resolution}
    extra_boundaries:
      stl_geometry:
        pattern: "*_single_solid.stl.pmsh"
  augmentations:
    - _target_: ${dp:RandomRotateMesh}
      axes: ["z"]
      transform_point_data: true
      transform_global_data: true
    - _target_: ${dp:RandomTranslateMesh}
      distribution:
        _target_: torch.distributions.Uniform
        low: [-1.0, -1.0, 0.0]
        high: [1.0, 1.0, 0.0]
  transforms:
    - _target_: ${dp:DropMeshFields}
      global_data: [TimeValue]
    - _target_: ${dp:CenterMesh}
      use_area_weighting: false
    - _target_: ${dp:NonDimensionalizeByMetadata}
      fields:
        UMeanTrim: velocity
        pMeanTrim: pressure
        nutMeanTrim: identity
      association: point_data
    - _target_: ${dp:ComputeSDFFromBoundary}
      boundary_name: stl_geometry
      sdf_field: sdf
      normals_field: sdf_normals
      # Pseudo-normal sign (fed by the fast nearest-triangle kernel). The
      # _single_solid STL is watertight, so this is exact and avoids the
      # O(n_points * n_faces) winding-number sign pass.
      use_winding_number: false
    - _target_: ${dp:DropBoundary}
      names: [stl_geometry]
    - _target_: ${dp:RenameMeshFields}
      point_data:
        UMeanTrim: velocity
        pMeanTrim: pressure
        nutMeanTrim: nut
    - _target_: ${dp:NormalizeMeshFields}
      association: point_data
      fields:
        nut: {type: scalar, mean: 4.8e-4, std: 9.4e-4}
    # No terminal MeshToTensorDict / RestructureTensorDict: the volume YAML
    # already produces a DomainMesh natively (interior = volume mesh with
    # target fields in point_data; boundaries = {"vehicle": car body}).
    # The recipe's collate consumes the DomainMesh directly using each
    # model YAML's `forward_kwargs:` spec. Targets are extracted from
    # interior.point_data.<name> by the `targets:` block below.

targets:
  velocity: vector
  pressure: scalar
  nut: scalar
