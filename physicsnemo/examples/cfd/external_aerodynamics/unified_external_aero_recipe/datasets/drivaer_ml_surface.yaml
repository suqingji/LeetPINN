# DrivaerML surface dataset
# Reads the boundary surface Mesh directly from DomainMesh .pdmsh files
# by navigating into the on-disk tensordict directory structure.
# Triangulated surface mesh. Fields live in cell_data.
# global_data: the boundary tensordict's own global_data carries only
# dataset-local fields (e.g. TimeValue); the case-level freestream
# conditions (U_inf, rho_inf, p_inf, nu, L_ref) live on the parent
# DomainMesh's _tensordict/global_data, so we use MeshReaderWithGlobalData
# to merge them onto each boundary Mesh at load time.
# Splits are controlled by manifest.json + train_split/val_split in the training config.

train_datadir: ${dataset_paths.drivaer_ml}

pipeline:
  reader:
    _target_: ${dp:MeshReaderWithGlobalData}
    path: ${train_datadir}
    pattern: "run_*/*.pdmsh/_tensordict/boundaries/vehicle"
    subsample_n_cells: ${sampling_resolution}
    # Walk up two levels from the boundary tensordict to the parent
    # DomainMesh's global_data and merge its keys onto each sample.
    merge_global_data_from: "../../global_data"
  augmentations:
    - _target_: ${dp:RandomRotateMesh}
      axes: ["z"]
      transform_cell_data: true
      transform_global_data: true
    - _target_: ${dp:RandomTranslateMesh}
      distribution:
        _target_: torch.distributions.Uniform
        low: [-1.0, -1.0, 0.0]
        high: [1.0, 1.0, 0.0]
  transforms:
    - _target_: ${dp:DropMeshFields}
      global_data: [TimeValue]
    - _target_: ${dp:CenterMesh}
      use_area_weighting: false
    - _target_: ${dp:NonDimensionalizeByMetadata}
      fields:
        pMeanTrim: pressure
        wallShearStressMeanTrim: stress
      association: cell_data
    - _target_: ${dp:RenameMeshFields}
      cell_data:
        pMeanTrim: pressure
        wallShearStressMeanTrim: wss
    - _target_: ${dp:NormalizeMeshFields}
      association: cell_data
      fields:
        wss: {type: vector, mean: [0.0, 0.0, 0.0], std: 0.00313}
    - _target_: ${dp:ComputeSurfaceNormals}
      store_as: cell_data
      field_name: normals
    - _target_: ${dp:SubsampleMesh}
      n_cells: ${sampling_resolution}
    # Terminal transform: convert the surface Mesh into a DomainMesh per the
    # recipe's prediction-vs-input contract. `interior` becomes a Mesh[0, 3]
    # point cloud at the cell centroids (where the model predicts), with the
    # target fields moved into `interior.point_data`. `boundaries.vehicle` is
    # the original triangulated surface, with non-target cell features
    # (normals) preserved on the boundary's cell_data. The dataset builder
    # auto-injects `cell_data_targets` from the `targets:` block below.
    - _target_: ${dp:MeshToDomainMesh}
      interior_points: cell_centroids

# Single source of truth for prediction field names + types. Read by both the
# dataset builder (auto-injected into MeshToDomainMesh above) and the train
# loop (used to build LossCalculator and MetricCalculator).
targets:
  pressure: scalar
  wss: vector
