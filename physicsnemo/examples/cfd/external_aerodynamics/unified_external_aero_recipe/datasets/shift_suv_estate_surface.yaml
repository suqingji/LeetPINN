# SHIFT SUV Estate surface dataset
# Reads the boundary surface Mesh inside each run's `domain.pdmsh`
# by navigating into the on-disk tensordict directory structure.
# Triangulated surface mesh. Fields live in cell_data.
# global_data: the boundary tensordict's own global_data is empty; the
# case-level freestream conditions (U_inf, p_inf, rho_inf, nu, L_ref)
# live on the parent DomainMesh's _tensordict/global_data, so we use
# MeshReaderWithGlobalData to merge them onto each boundary Mesh at
# load time.

# All splits share this root; the train/val/test subsets are selected
# by manifest.json (auto-discovered next to train_datadir) plus the
# top-level train_split / val_split keys in the training config.
train_datadir: ${dataset_paths.shift_suv}/estate/

pipeline:
  reader:
    _target_: ${dp:MeshReaderWithGlobalData}
    path: ${train_datadir}
    pattern: "run_*/domain.pdmsh/_tensordict/boundaries/vehicle"
    # Walk up two levels from the boundary tensordict to the parent
    # DomainMesh's global_data and merge its keys onto each sample.
    merge_global_data_from: "../../global_data"
  augmentations:
    - _target_: ${dp:RandomRotateMesh}
      axes: ["z"]
      transform_cell_data: true
      transform_global_data: true
    - _target_: ${dp:RandomTranslateMesh}
      distribution:
        _target_: torch.distributions.Uniform
        low: [-1.0, -1.0, 0.0]
        high: [1.0, 1.0, 0.0]
  transforms:
    - _target_: ${dp:CenterMesh}
      use_area_weighting: true
    - _target_: ${dp:NonDimensionalizeByMetadata}
      fields:
        pressure_average: pressure
        wall_shear_stress_average: stress
      association: cell_data
    - _target_: ${dp:RenameMeshFields}
      cell_data:
        pressure_average: pressure
        wall_shear_stress_average: wss
    - _target_: ${dp:NormalizeMeshFields}
      association: cell_data
      fields:
        wss: {type: vector, mean: [0.0, 0.0, 0.0], std: 0.00183}
    - _target_: ${dp:ComputeSurfaceNormals}
      store_as: cell_data
      field_name: normals
    - _target_: ${dp:SubsampleMesh}
      n_cells: ${sampling_resolution}
    # Terminal: convert the surface Mesh into a DomainMesh per the recipe
    # contract. cell_data_targets are auto-injected from the `targets:` block.
    - _target_: ${dp:MeshToDomainMesh}
      interior_points: cell_centroids

targets:
  pressure: scalar
  wss: vector
